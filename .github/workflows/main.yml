name: Build and Release

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:

  # ── Job 1: Strict Build ─────────────────────────────────────
  # Builds the ClientApp in Release mode.
  # TreatWarningsAsErrors means any compiler warning fails
  # the build so I catch problems early.
  build:
    name: Strict Build (Warnings as Errors)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install .NET 10 to match my development environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore NuGet packages including gRPC dependencies
      - name: Restore dependencies
        run: dotnet restore ClientApp/ClientApp.csproj

      # Build in Release mode - fails if any warnings are found
      - name: Build (strict)
        run: >
          dotnet build ClientApp/ClientApp.csproj
          --configuration Release
          --no-restore
          -p:TreatWarningsAsErrors=true

  # ── Job 2: Publish ──────────────────────────────────────────

  publish:
    name: Publish Release EXE
    runs-on: windows-latest
    # Only runs if the build job passed
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ClientApp/ClientApp.csproj

      # Publish as a single self-contained exe for Windows 64-bit
      - name: Publish self-contained EXE
        run: >
          dotnet publish ClientApp/ClientApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      # Upload the exe so it can be downloaded from the Actions tab
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientApp-Release
          path: ./publish
          retention-days: 30

  # ── Job 3: Auto Tag and GitHub Release ─────────────────────

  release:
    name: Create GitHub Release
    runs-on: windows-latest
    # Only runs if the publish job passed
    needs: publish
    # Write permission needed to create tags and releases
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ClientApp/ClientApp.csproj

      - name: Publish self-contained EXE
        run: >
          dotnet publish ClientApp/ClientApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      # Generate a unique version tag from the GitHub run number
  
      - name: Create version tag
        id: tag
        run: |
          $version = "v1.0.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $version
          git push origin $version

      # Create the GitHub Release and attach the exe as a download
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: "Astronomical Processing System ${{ steps.tag.outputs.VERSION }}"
          body: |
            ## Astronomical Processing System
            **Client Application - Automatic Release**

            ### What's included
            - Self-contained Windows executable (no .NET install required)
            - Built from commit: ${{ github.sha }}

            ### How to run
            Download `ClientApp.exe` below and run it directly.
            Make sure `ServerApp` is running first.
          files: ./publish/ClientApp.exe
          draft: false
          prerelease: false
