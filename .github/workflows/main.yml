name: Build and Release

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:

  # ── Job 1: Strict Build ─────────────────────────────────────
  # Builds the ClientApp in Release mode.
  # TreatWarningsAsErrors means any compiler warning fails
  # the build so I catch problems early.
  build:
    name: Strict Build (Warnings as Errors)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install .NET 10 to match my development environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore NuGet packages including gRPC dependencies
      - name: Restore dependencies
        run: dotnet restore ClientApp/ClientApp.csproj

      # Build in Release mode - fails if any warnings are found
      - name: Build (strict)
        run: >
          dotnet build ClientApp/ClientApp.csproj
          --configuration Release
          --no-restore
          -p:TreatWarningsAsErrors=true

 # ── Job 2: Publish ──────────────────────────────────────────
  # Publishes both ClientApp and ServerApp as self-contained
  # Windows exes so the user never needs .NET or Visual Studio.
  publish:
    name: Publish Release EXE
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Publish ClientApp as a single self-contained exe
      - name: Publish ClientApp
        run: >
          dotnet publish ClientApp/ClientApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/client

      # Publish ServerApp as a single self-contained exe
      - name: Publish ServerApp
        run: >
          dotnet publish ServerApp/ServerApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/server

      # Upload both exes as one artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstronomicalProcessingSystem-Release
          path: ./publish
          retention-days: 30

  # ── Job 3: Auto Tag and GitHub Release ─────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Publish ClientApp for release attachment
      - name: Publish ClientApp
        run: >
          dotnet publish ClientApp/ClientApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/client

      # Publish ServerApp for release attachment
      - name: Publish ServerApp
        run: >
          dotnet publish ServerApp/ServerApp.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish/server

      - name: Create version tag
        id: tag
        run: |
          $version = "v1.0.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $version
          git push origin $version

      # Attach both exes to the GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: "Astronomical Processing System ${{ steps.tag.outputs.VERSION }}"
          body: |
            ## Astronomical Processing System
            **Automatic Release — no install required**

            ### How to run
            1. Download both files below
            2. Double click `ServerApp.exe` — a console window will open, leave it running
            3. Double click `ClientApp.exe`

            >  ServerApp.exe must be running before you open ClientApp.exe

            Built from commit: ${{ github.sha }}
          files: |
            ./publish/client/ClientApp.exe
            ./publish/server/ServerApp.exe
          draft: false
          prerelease: false
  
